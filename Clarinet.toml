[project]
name = "indexer-clever-runtime"
authors = ["Clever Runtime Team"]
description = "A decentralized indexing system for tracking and verifying impact metrics"
telemetry = false
requirements = []

[contracts.impact-indexer]
path = "contracts/impact-indexer.clar"
depends_on = []

[repl]
